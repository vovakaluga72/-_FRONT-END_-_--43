<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Задание 2</title>
    <link rel="stylesheet" href="css/style.css" />
    <script>
      function analyzeNumber(num) {
        // if
        if (num < 0) {
          return "Отрицательное число";
        } else if (num === 0) {
          return "Ноль";
        } else {
          // switch
          switch (num) {
            case 1:
              return "Единица";
            case 7:
              return "Счастливая семерка";
            default:
              return "Положительное число";
          }
        }
      }

      function processData() {
        let result = [];
        // for
        for (let i = 1; i <= 10; i++) {
          if (i % 2 === 0) {
            // continue
            continue;
          }
          result.push(i);
        }

        let counter = 0;
        // while
        while (counter < result.length) {
          if (result[counter] > 7) {
            // break
            break;
          }
          counter++;
        }

        let attempts = 0;
        // do..while
        do {
          attempts++;
        } while (attempts < 3);
        
        // return
        return {
          analysis: analyzeNumber(7),
          filteredArray: result,
          whileLoopIndex: counter,
          doWhileAttempts: attempts,
        };
      }

      // Сохраняем результат в переменную
      const data = processData();

      // 1. Вывод в консоль (как было изначально)
      console.log(data);

      // 2. Дополнительный вывод в модальное окно
      alert("Результат работы скрипта:\n" + JSON.stringify(data, null, 2));
    </script>
  </head>
  <body>
    <a href="index.html"><button>← Назад на главную</button></a>
    <hr />

    <h2>Задание 2: Использование операторов JS</h2>
    <p>Результат работы скрипта находится в консоли разработчика и во всплывающем окне.</p>
  </body>
</html>
