<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lr6/index2 - Резиновая верстка с Grid</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Times New Roman", serif; padding: 20px; }

        .layout {
            width: 100%;
            border: 1px solid #000;
            display: grid;
            grid-template-rows: auto 1fr auto;
            grid-template-columns: 1fr;
            grid-template-areas:
                "header"
                "grid"
                "footer";
        }

        .header {
            grid-area: header;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #000;
            font-size: 36px;
            font-weight: 700;
            line-height: 1;
        }

        .footer {
            grid-area: footer;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 1px solid #000;
            font-size: 36px;
            font-weight: 700;
            line-height: 1;
        }

        .grid {
            grid-area: grid;
            display: grid;
            grid-template-columns: 30% 40% 30%;
            grid-template-rows: 52px 52px 52px;
            grid-template-areas:
                "b1 b4 b5"
                "b2 b4 ."
                "b3 b4 b6";
            gap: 0;
            align-content: start;
            justify-content: start;
            align-items: stretch;
            justify-items: stretch;
            grid-auto-rows: 52px;
            grid-auto-columns: auto;
            grid-auto-flow: row;
        }

        .block {
            border: 1px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            font-weight: 700;
            line-height: 1;
        }

        .b1 { grid-area: b1; }
        .b2 { grid-area: b2; }
        .b3 { grid-area: b3; }
        .b4 { grid-area: b4; }
        .b5 { grid-area: b5; }
        .b6 { grid-area: b6; }
    </style>
</head>
<body>
    <div class="layout">
        <div class="header">Шапка</div>

        <div class="grid">
            <div class="block b1">1</div>
            <div class="block b2">2</div>
            <div class="block b3">3</div>
            <div class="block b4">4</div>
            <div class="block b5">5</div>
            <div class="block b6">6</div>
        </div>

        <div class="footer">Подвал</div>
    </div>
</body>
</html>
